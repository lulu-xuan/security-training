{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">用户注册</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('register') }}" class="form">
        <!-- CSRF 防护令牌 (V-06 修复) -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input"
                   placeholder="请输入用户名" maxlength="50" required>
        </div>

        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" class="form-input"
                   placeholder="请输入邮箱（选填）" maxlength="100">
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="至少6位，包含大小写字母和数字" maxlength="128" required>
            <small class="form-hint">至少6位，需包含大写字母、小写字母和数字</small>
        </div>

        <div class="form-group">
            <label for="confirm_password">确认密码</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   class="form-input" placeholder="请再次输入密码" maxlength="128" required>
        </div>

        <button type="submit" class="btn btn-primary">注册</button>
    </form>

    <div class="form-footer">
        <p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
    </div>
</div>
{% endblock %}
