<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮助中心</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; }
        h1 { color: #667eea; }
        h2 { color: #764ba2; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .section { margin: 20px 0; padding: 16px; background: #f8f9ff; border-radius: 8px; }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>📖 帮助中心</h1>
    <p>欢迎使用用户管理系统！以下是一些常见问题的帮助信息。</p>

    <div class="section">
        <h2>🔐 如何登录？</h2>
        <p>点击导航栏的「登录」链接，输入用户名和密码即可登录。</p>
        <p>默认管理员账号：<code>admin</code> / <code>admin123</code></p>
    </div>

    <div class="section">
        <h2>🔍 如何搜索用户？</h2>
        <p>登录后，在首页的搜索框中输入关键词（用户名或邮箱），点击搜索即可。</p>
    </div>

    <div class="section">
        <h2>📷 如何上传头像？</h2>
        <p>登录后点击导航栏的「上传头像」链接，选择文件后点击上传。</p>
    </div>

    <div class="section">
        <h2>👤 如何查看个人中心？</h2>
        <p>登录后点击导航栏的「个人中心」链接，可以查看和修改个人信息。</p>
    </div>

    <div class="section">
        <h2>💰 如何充值？</h2>
        <p>进入「个人中心」后，在充值表单中输入金额，点击充值按钮即可。</p>
    </div>

    <p><a href="/">← 返回首页</a></p>
</body>
</html>
