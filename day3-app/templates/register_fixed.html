{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">用户注册（修复版）</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('register') }}" class="form">
        <!-- ✅ CSRF 防护恢复 -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">用户名（仅字母、数字、下划线）</label>
            <input type="text" id="username" name="username" class="form-input"
                   placeholder="请输入用户名" maxlength="50" required
                   pattern="[a-zA-Z0-9_]+" title="仅允许字母、数字和下划线">
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="请输入密码（已启用哈希存储）" maxlength="128" required>
        </div>

        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" class="form-input"
                   placeholder="请输入邮箱（选填）" maxlength="100">
        </div>

        <div class="form-group">
            <label for="phone">手机</label>
            <input type="text" id="phone" name="phone" class="form-input"
                   placeholder="请输入手机号（选填）" maxlength="20">
        </div>

        <button type="submit" class="btn btn-primary">注册</button>
    </form>

    <div class="form-footer">
        <p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
    </div>
</div>
{% endblock %}
