{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">用户登录（修复版）</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}" class="form">
        <!-- ✅ CSRF 防护恢复 -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">用户名（仅字母、数字、下划线）</label>
            <input type="text" id="username" name="username" class="form-input"
                   placeholder="请输入用户名" maxlength="50" required
                   pattern="[a-zA-Z0-9_]+" title="仅允许字母、数字和下划线">
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="请输入密码" maxlength="128" required>
        </div>

        <button type="submit" class="btn btn-primary">登录</button>
    </form>

    <div class="form-footer">
        <p>还没有账号？<a href="{{ url_for('register') }}">立即注册</a></p>
    </div>
</div>
{% endblock %}
