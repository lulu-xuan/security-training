{% extends "upload_labs_fixed_base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">注册</h2>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post" action="{{ url_for('register') }}" class="form">
        <div class="form-group"><label>用户名</label><input type="text" name="username" class="form-input" required></div>
        <div class="form-group"><label>密码</label><input type="password" name="password" class="form-input" required></div>
        <div class="form-group"><label>邮箱</label><input type="email" name="email" class="form-input"></div>
        <div class="form-group"><label>手机</label><input type="text" name="phone" class="form-input"></div>
        <button type="submit" class="btn btn-primary">注册</button>
    </form>
    <div class="form-footer"><p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p></div>
</div>
{% endblock %}
